name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install
        
      - name: Build configuration
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET_VEHICLE_DRIVER: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_VEHICLE_DRIVER }}
          CLOUDINARY_UPLOAD_PRESET_PAYMENT_BILLING: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_PAYMENT_BILLING }}
          CLOUDINARY_UPLOAD_PRESET_PROFILE_PIC: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_PROFILE_PIC }}
          CLOUDINARY_UPLOAD_PRESET_DOCUMENTS: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_DOCUMENTS }}
          CLOUDINARY_UPLOAD_PRESET_RECEIPTS: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_RECEIPTS }}
          CLOUDINARY_UPLOAD_PRESET_EXPENSES: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_EXPENSES }}
          CLOUDINARY_UPLOAD_PRESET_TYRES: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_TYRES }}
          CLOUDINARY_UPLOAD_PRESET_VEHICLES: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_VEHICLES }}
          CLOUDINARY_UPLOAD_PRESET_DRIVERS: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_DRIVERS }}
          CLOUDINARY_UPLOAD_PRESET_INVOICES: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_INVOICES }}
          CLOUDINARY_UPLOAD_PRESET_LR_REPORTS: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_LR_REPORTS }}
          CLOUDINARY_UPLOAD_PRESET_TRIP_EXPENSES: ${{ secrets.CLOUDINARY_UPLOAD_PRESET_TRIP_EXPENSES }}
          CLOUDINARY_API_URL: ${{ secrets.CLOUDINARY_API_URL }}
          CLOUDINARY_BASE_URL: ${{ secrets.CLOUDINARY_BASE_URL }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          ENVIRONMENT: production
        run: node secure-config-builder.js
        
      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
