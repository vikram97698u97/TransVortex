<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpeg" href="IMG-20250920-WA0002.jpg">



  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense & Transporter Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    

    

    .hidden {
      display: none !important;
    }

    .preview {
      max-width: 120px;
      max-height: 120px;
      border-radius: 6px;
      display: block;
      margin-top: 8px;
      border: 1px solid #ddd;
    }
  </style>

    <!-- 🔥 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    
    <!-- 🔐 Configuration Loading -->
    <script src="evm.js"></script>
    <script src="secure-api-loader.js"></script>
  <script src="auth-manager.js"></script>
  <script src="money-flow-utils.js"></script>
  <script>
    (async function() { if(window.AuthManager) await window.AuthManager.enforcePageAccess("payment-billing"); })();
  </script>
  <link rel="stylesheet" href="portal-theme.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="container">
    <div class="main-content">
      <h2 class="mb-4"><i class="fas fa-wallet me-2"></i>Expense Management</h2>
      
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center py-3">
          <h5 class="mb-0 fw-bold text-success" id="formHeaderTitle"><i class="fas fa-plus-circle me-2"></i>Add New Expense</h5>
          <div id="draftStatus" class="text-muted" style="font-size: 0.85rem;"></div>
        </div>
        <div class="card-body p-4">
          <form id="expenseForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="expenseType" class="form-label fw-semibold">Expense Type:</label>
                <select id="expenseType" class="form-select" required>
                    <option value="">Select Type</option>                
                    <option value="Tyre">Tyre</option>                
                    <option value="Salary">Salary</option>
                    <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="expenseAmount" class="form-label fw-semibold">Amount (₹):</label>
                <input type="number" id="expenseAmount" class="form-control" placeholder="Enter amount" required />
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="expenseDate" class="form-label fw-semibold">Date:</label>
                <input type="date" id="expenseDate" class="form-control" required />
              </div>
              <div class="col-md-6 mb-3">
                <label for="expenseAccountId" class="form-label fw-semibold">Payment Account: <span class="text-danger">*</span></label>
                <select id="expenseAccountId" class="form-select" required>
                    <option value="">Select Account</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-12 mb-3">
                <label for="expenseProofFile" class="form-label fw-semibold">Upload Proof:</label>
                <input type="file" id="expenseProofFile" class="form-control" accept="image/*,application/pdf"/>
                <img id="expensePreview" class="preview" style="display:none;" />
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-2">
              <button type="button" id="cancelExpenseEditBtn" class="btn btn-secondary hidden">Cancel Edit</button>
              <button type="submit" class="btn btn-success" id="submitExpenseBtn"><i class="fas fa-save me-2"></i>Add Expense</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-light d-flex justify-content-between align-items-center py-3">
          <h5 class="mb-0 fw-bold text-success"><i class="fas fa-list me-2"></i>Expenses List</h5>
          <div style="max-width: 250px; width: 100%;">
            <input type="text" id="expenseSearchInput" class="form-control" placeholder="Search by type..." />
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive m-0 shadow-none border-0">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Proof</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="expenseTableBody"></tbody>
            </table>
          </div>
        </div>
        <div class="card-footer bg-white border-top py-3">
          <!-- Pagination for Expenses -->
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="d-flex align-items-center gap-2">
              <label for="entriesPerPageExpenses" class="form-label mb-0 fw-semibold">Show:</label>
              <select id="entriesPerPageExpenses" class="form-select form-select-sm" style="width: auto;">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
              <div id="entriesInfoExpenses" class="text-muted small"></div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-success" id="prevPageExpenses" disabled>
                <i class="fas fa-chevron-left"></i>
              </button>
              <div class="d-flex gap-1" id="tabNavigationExpenses"></div>
              <button class="btn btn-sm btn-success" id="nextPageExpenses">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="navbar-loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, push, set, remove, update, query, orderByChild, orderByKey, equalTo, increment, limitToFirst, startAt } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Load Firebase configuration securely from EVM
    let firebaseConfig;
    
    try {
      // Get Firebase configuration from secure EVM system
      // Initialize Firebase with proper error handling
    try {
        if (!window.FIREBASE_CONFIG) {
            throw new Error('Firebase configuration not loaded. Please ensure evm.js is loaded first.');
        }
        
        if (!window.FIREBASE_CONFIG.databaseURL) {
            throw new Error('Firebase databaseURL not found in configuration.');
        }
        
        if (!window.FIREBASE_CONFIG.projectId) {
            throw new Error('Firebase projectId not found in configuration.');
        }
        
        firebaseConfig = window.FIREBASE_CONFIG;
        
        // Check if we're using fallback values
        if (false) { // Condition is always false in the final logic, keeping as per original structure
            
        } else {

            
        }
    } catch (error) {
        console.error('❌ Failed to load Firebase configuration:', error);
        
        // Use fallback configuration to prevent complete failure
        window.SECURE_FIREBASE_CONFIG || await window.SECURE_CONFIG_LOADER.loadConfig();
        
    }} catch (error) {
      console.error('❌ Failed to load Firebase configuration:', error);
      
      // Use fallback configuration to prevent complete failure
      firebaseConfig = window.FIREBASE_CONFIG;
    }

    const app = initializeApp(window.FIREBASE_CONFIG);
    const db = getDatabase(app);
    const auth = getAuth();
    let currentUserUID = null;
    let effectiveCoreAccountId = null;

    onAuthStateChanged(auth, user => {
      if (user) {
        currentUserUID = user.uid;
        const userRef = ref(db, `users/${user.uid}`);
        get(userRef).then(snapshot => {
          const userData = snapshot.val() || {};
          const coreAccountId = userData.coreAccountId || user.uid;
          effectiveCoreAccountId = coreAccountId;
          
          if (window.MoneyFlow) {
              window.MoneyFlow.coreAccountId = coreAccountId;
              window.MoneyFlow.recordedBy = user.displayName || user.email || 'System';
          }
          
          loadExpenses();
          populateExpensePaymentAccounts();
        });

        // --- GLOBAL AUTO-SAVE & DRAFT PERSISTENCE ---
        const expenseForm = document.getElementById('expenseForm');
        const fields = ['expenseType', 'expenseAmount', 'expenseDate', 'expenseAccountId'];
        const save = () => {
          const draft = {};
          fields.forEach(id => { draft[id] = document.getElementById(id).value; });
          localStorage.setItem(`tv_billing_draft_${currentUserUID}`, JSON.stringify(draft));
          const el = document.getElementById('draftStatus');
          if (el) el.textContent = 'Draft last saved: ' + new Date().toLocaleTimeString();
        };
        const restore = () => {
          const raw = localStorage.getItem(`tv_billing_draft_${currentUserUID}`);
          if (!raw) return;
          try {
            const draft = JSON.parse(raw);
            fields.forEach(id => { if (draft[id] !== undefined) document.getElementById(id).value = draft[id]; });
          } catch(e) {}
        };
        expenseForm.addEventListener('input', save);
        restore();
        // --------------------------------------------
      } else {
        window.location.href = "index.html";
      }
      window.logout = function() {
        signOut(auth).then(() => {
          window.location.href = "index.html";
        }).catch(error => {
          alert("Error logging out: " + error.message);
        });
      };
    });

    // Expense Form Elements
    const expenseForm = document.getElementById("expenseForm");
    const expenseType = document.getElementById("expenseType");
    const expenseAmount = document.getElementById("expenseAmount");
    const expenseDate = document.getElementById("expenseDate");
    const expenseProofFile = document.getElementById("expenseProofFile");
    const expensePreview = document.getElementById("expensePreview");
    const expenseSearchInput = document.getElementById("expenseSearchInput");
    const expenseTableBody = document.getElementById("expenseTableBody");
    let expenses = [];

    // Pagination state for Expenses
    const entriesPerPageSelectExpenses = document.getElementById('entriesPerPageExpenses');
    const entriesInfoExpenses = document.getElementById('entriesInfoExpenses');
    const tabNavigationExpenses = document.getElementById('tabNavigationExpenses');
    const prevPageBtnExpenses = document.getElementById('prevPageExpenses');
    const nextPageBtnExpenses = document.getElementById('nextPageExpenses');
    let currentPageExpenses = 1;
    let itemsPerPageExpenses = 10;
    let totalPagesExpenses = 1;
    let filteredExpenses = [];
    let pageCursorsExpenses = { 1: null };
    let hasNextPageExpenses = false;

    async function resizeImage(file, maxWidth = 800) {
      return new Promise((resolve) => {
        const img = document.createElement("img");
        const reader = new FileReader();
        reader.onload = (e) => { img.src = e.target.result; };
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const scaleFactor = maxWidth / img.width;
          canvas.width = maxWidth;
          canvas.height = img.height * scaleFactor;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            resolve(new File([blob], file.name, { type: file.type }));
          }, file.type, 0.85);
        };
        reader.readAsDataURL(file);
      });
    }

    async function uploadToCloudinary(file) {
      if (file.type.startsWith("image")) {
        file = await resizeImage(file, 800);
      }
      const cloudName = window.CLOUDINARY_CONFIG?.cloudName;
      const preset = window.CLOUDINARY_CONFIG?.presets?.paymentBilling;

      if (!cloudName || !preset) {
        console.error("❌ Cloudinary configuration missing");
        alert("Configuration Error: Cloudinary cloudName or upload preset is not set.");
        throw new Error("Cloudinary configuration missing");
      }

      const url = `https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`;
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", preset);
      const res = await fetch(url, { method: "POST", body: formData });
      const data = await res.json();
      return data.secure_url;
    }

    // --- EXPENSE PAYMENT LOGIC ---

    expenseProofFile.addEventListener("change", () => {
      const file = expenseProofFile.files[0];
      if (file && file.type.startsWith("image")) {
        const reader = new FileReader();
        reader.onload = () => { expensePreview.src = reader.result; expensePreview.style.display = "block"; };
        reader.readAsDataURL(file);
      } else {
        expensePreview.style.display = "none";
      }
    });

    async function handleAddExpense(e) {
      e.preventDefault();
      const accountId = document.getElementById('expenseAccountId').value;
      if (!accountId) return alert("Please select a payment account.");

      let fileURL = "";
      const file = expenseProofFile.files[0];
      if (file) fileURL = await uploadToCloudinary(file);

      const expenseData = {
        type: expenseType.value,
        amount: parseFloat(expenseAmount.value) || 0,
        date: expenseDate.value,
        proof: fileURL,
        paymentAccountId: accountId,
        userId: currentUserUID,
        createdAt: new Date().toISOString()
      };

      const newExpenseRef = push(ref(db, `users/${effectiveCoreAccountId}/expenses`));
      expenseData.id = newExpenseRef.key;
      await set(newExpenseRef, expenseData);
      
      // Money Flow Integration
      if (window.MoneyFlow) {
          await window.MoneyFlow.recordPayment({
              refId: expenseData.id,
              category: `Expense: ${expenseData.type}`,
              amount: expenseData.amount,
              type: 'debit',
              accountId: accountId,
              note: `General Expense (${expenseData.type})`,
              date: expenseData.date
          });
      }

      localStorage.removeItem(`tv_billing_draft_${currentUserUID}`);
      expenseForm.reset();
      expensePreview.style.display = "none";
      loadExpenses();
    }

    expenseForm.onsubmit = handleAddExpense;

    function loadExpenses() {
      pageCursorsExpenses = { 1: null };
      currentPageExpenses = 1;
      fetchPageExpenses();
    }

    async function fetchPageExpenses() {
      try {
        const expensesRef = ref(db, `users/${effectiveCoreAccountId}/expenses`);
        let q;
        const startKey = pageCursorsExpenses[currentPageExpenses];
        
        if (startKey) {
          q = query(expensesRef, orderByKey(), startAt(startKey), limitToFirst(itemsPerPageExpenses + 1));
        } else {
          q = query(expensesRef, orderByKey(), limitToFirst(itemsPerPageExpenses + 1));
        }
        
        const snapshot = await get(q);
        expenses = [];
        if (snapshot.exists()) {
          snapshot.forEach(child => {
            expenses.push(child.val());
          });
        }
        
        if (expenses.length > itemsPerPageExpenses) {
          hasNextPageExpenses = true;
          const nextItem = expenses[itemsPerPageExpenses];
          pageCursorsExpenses[currentPageExpenses + 1] = nextItem.id;
          expenses = expenses.slice(0, itemsPerPageExpenses);
        } else {
          hasNextPageExpenses = false;
        }
        
        renderExpensesList();
      } catch (e) {
        console.error("Error loading paginated expenses:", e);
      }
    }

    function renderExpensesList() {
      expenseTableBody.innerHTML = "";
      const searchValue = (expenseSearchInput.value || '').toLowerCase();
      const filtered = searchValue 
        ? expenses.filter(p => (p.type || '').toLowerCase().includes(searchValue))
        : expenses;
        
      filtered.forEach(expense => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${expense.date}</td>
          <td><span class="badge bg-secondary">${expense.type}</span></td>
          <td class="fw-semibold">₹${(parseFloat(expense.amount) || 0).toFixed(2)}</td>
          <td>${expense.proof ? `<a href="${expense.proof}" class="btn btn-sm btn-outline-primary" target="_blank"><i class="fas fa-eye me-1"></i>View</a>` : '<span class="text-muted">—</span>'}</td>
          <td>
            <button class="btn btn-sm btn-warning text-dark me-1" onclick="editExpense('${expense.id}')" data-permission="edit_records"><i class="fas fa-edit me-1"></i>Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteExpense('${expense.id}')" data-permission="delete_records"><i class="fas fa-trash me-1"></i>Delete</button>
          </td>
        `;
        expenseTableBody.appendChild(tr);
      });
      
      prevPageBtnExpenses.disabled = currentPageExpenses === 1;
      nextPageBtnExpenses.disabled = !hasNextPageExpenses;
      entriesInfoExpenses.textContent = `Showing Page ${currentPageExpenses} (${filtered.length} entries)`;
      tabNavigationExpenses.innerHTML = `<span class="px-2 align-self-center text-muted">Page ${currentPageExpenses}</span>`;
    }

    async function populateExpensePaymentAccounts() {
      const select = document.getElementById('expenseAccountId');
      if (!select) return;
      try {
        const accounts = await window.MoneyFlow.getAccounts();
        const sorted = Object.entries(accounts).sort((a,b) => a[1].name.localeCompare(b[1].name));
        select.innerHTML = '<option value="">Select Account</option>';
        sorted.forEach(([id, acc]) => {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = `${acc.name} (${acc.type.toUpperCase()})`;
          select.appendChild(opt);
        });
      } catch(e) {
        console.error('[MoneyFlow] Failed to load accounts in payment-billing:', e);
      }
    }

    window.editExpense = (id) => {
      const expense = expenses.find(ex => ex.id === id);
      if (!expense) return;

      expenseType.value = expense.type;
      expenseAmount.value = expense.amount;
      expenseDate.value = expense.date;
      const accSelect = document.getElementById('expenseAccountId');
      if (accSelect) accSelect.value = expense.paymentAccountId || '';
      if (expense.proof) { expensePreview.src = expense.proof; expensePreview.style.display = 'block'; }

      expenseForm.scrollIntoView({ behavior: 'smooth' });
      const submitBtn = document.getElementById('submitExpenseBtn');
      submitBtn.innerHTML = '<i class="fas fa-edit me-2"></i>Update Expense';
      
      const cancelBtn = document.getElementById('cancelExpenseEditBtn');
      if (cancelBtn) {
        cancelBtn.classList.remove('hidden');
        cancelBtn.onclick = () => {
          expenseForm.reset();
          expensePreview.style.display = 'none';
          submitBtn.innerHTML = '<i class="fas fa-save me-2"></i>Add Expense';
          cancelBtn.classList.add('hidden');
          expenseForm.onsubmit = handleAddExpense;
        };
      }

      expenseForm.onsubmit = async (e) => {
        e.preventDefault();
        const accountId = document.getElementById('expenseAccountId').value;
        if (!accountId) return alert("Please select a payment account.");

        const file = expenseProofFile.files[0];
        let fileURL = expense.proof;
        if (file) fileURL = await uploadToCloudinary(file);

        const updatedData = {
          ...expense,
          type: expenseType.value,
          amount: parseFloat(expenseAmount.value) || 0,
          date: expenseDate.value,
          proof: fileURL,
          paymentAccountId: accountId,
          updatedAt: new Date().toISOString()
        };
        await update(ref(db, `users/${effectiveCoreAccountId}/expenses/${id}`), updatedData);
        
        // Update in MoneyFlow
        if (window.MoneyFlow) {
            await window.MoneyFlow.recordPayment({
                refId: id,
                category: `Expense: ${updatedData.type}`,
                amount: updatedData.amount,
                type: 'debit',
                accountId: accountId,
                note: `General Expense (${updatedData.type})`,
                date: updatedData.date
            });
        }

        expenseForm.reset();
        expensePreview.style.display = 'none';
        submitBtn.innerHTML = '<i class="fas fa-save me-2"></i>Add Expense';
        if (cancelBtn) cancelBtn.classList.add('hidden');
        expenseForm.onsubmit = handleAddExpense;
        await fetchPageExpenses();
      };
    };

    window.deleteExpense = async (id) => {
      if (confirm("Delete this expense record?")) {
        await remove(ref(db, `users/${effectiveCoreAccountId}/expenses/${id}`));
        if (window.MoneyFlow) {
            await window.MoneyFlow.deletePayment(id);
        }
        await fetchPageExpenses();
      }
    };

    expenseSearchInput.addEventListener("input", () => { renderExpensesList(); });
    entriesPerPageSelectExpenses.addEventListener('change', function () { itemsPerPageExpenses = parseInt(this.value, 10) || 10; currentPageExpenses = 1; loadExpenses(); });
    prevPageBtnExpenses.addEventListener('click', () => { if (currentPageExpenses > 1) { currentPageExpenses--; fetchPageExpenses(); } });
    nextPageBtnExpenses.addEventListener('click', () => { if (hasNextPageExpenses) { currentPageExpenses++; fetchPageExpenses(); } });

    window.toggleMenu = function () {
      document.getElementById("navLinks").classList.toggle("show");
    };
  </script>
</body>
</html>
